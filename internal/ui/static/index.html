<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>pipepie</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#282a36;--bg2:#1e1f29;--bg3:#343746;--fg:#f8f8f2;
--purple:#bd93f9;--green:#50fa7b;--pink:#ff79c6;--cyan:#8be9fd;
--yellow:#f1fa8c;--red:#ff5555;--comment:#6272a4;--line:#44475a;
--mono:'JetBrains Mono','SF Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.03) 3px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999}
a{color:var(--cyan);text-decoration:none}a:hover{color:var(--fg)}
@keyframes glow{0%,100%{text-shadow:0 0 8px rgba(189,147,249,.3)}50%{text-shadow:0 0 20px rgba(189,147,249,.5)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.shell{display:flex;height:100vh}

/* Sidebar */
.side{width:48px;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;flex-shrink:0}
.side-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:13px;color:#fff;margin-bottom:16px}
.side-btn{width:34px;height:34px;border-radius:7px;border:none;background:transparent;color:var(--comment);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:16px}
.side-btn:hover{background:var(--bg3);color:var(--fg)}
.side-btn.on{background:rgba(189,147,249,.12);color:var(--purple)}

.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Topbar */
.top{height:48px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;gap:12px;background:var(--bg2);flex-shrink:0}
.top-title{font-family:'VT323',monospace;font-size:22px;color:var(--purple);animation:glow 4s ease-in-out infinite}
.top-sep{width:1px;height:18px;background:var(--line)}
.top-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;background:var(--bg);border:1px solid var(--line);border-radius:5px;font-family:var(--mono);font-size:12px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.off{background:var(--red);opacity:.7}
.top-r{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--comment)}

/* Stats */
.stats{display:flex;gap:1px;background:var(--line);border-bottom:1px solid var(--line);flex-shrink:0}
.st{flex:1;background:var(--bg2);padding:10px 16px}
.st .l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--comment)}
.st .v{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:-.02em}
.st .v.g{color:var(--green)}.st .v.r{color:var(--red)}.st .v.y{color:var(--yellow)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--line);padding:0 18px}
.tab{padding:8px 14px;cursor:pointer;color:var(--comment);border-bottom:2px solid transparent;font-size:13px;font-weight:500}
.tab.on{color:var(--purple);border-color:var(--purple)}
.tab:hover{color:var(--fg)}

.content{flex:1;overflow-y:auto}

/* Request table */
.rh{display:grid;grid-template-columns:72px 58px 1fr 52px 56px 48px 70px;padding:0 18px;height:30px;align-items:center;border-bottom:1px solid var(--line);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--comment);background:var(--bg2);position:sticky;top:0;z-index:5}
.rr{display:grid;grid-template-columns:72px 58px 1fr 52px 56px 48px 70px;padding:0 18px;height:38px;align-items:center;border-bottom:1px solid rgba(68,71,90,.4);cursor:pointer;transition:background .1s;font-size:13px;animation:fadeIn .15s ease}
.rr:hover{background:var(--bg3)}
.rr.sel{background:rgba(189,147,249,.06);border-left:2px solid var(--purple);padding-left:16px}
.c-t{font-family:var(--mono);font-size:11px;color:var(--comment)}
.c-m{font-family:var(--mono);font-size:12px;font-weight:600}
.mGET{color:var(--green)}.mPOST{color:var(--yellow)}.mPUT{color:var(--cyan)}.mPATCH{color:var(--purple)}.mDELETE{color:var(--red)}
.c-p{font-family:var(--mono);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-s{font-family:var(--mono);font-size:12px;font-weight:600}.s2{color:var(--green)}.s4{color:var(--yellow)}.s5{color:var(--red)}.sp{color:var(--comment)}
.c-d{font-family:var(--mono);font-size:11px;color:var(--comment)}
.step{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(189,147,249,.1);color:var(--purple)}

/* Trace (Jaeger-style) */
.tr-card{background:var(--bg2);border:1px solid var(--line);border-radius:6px;margin:0 18px 10px;overflow:hidden;animation:fadeIn .2s ease}
.tr-h{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line)}
.tr-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--purple)}
.tr-id{font-family:var(--mono);font-size:11px;color:var(--comment);margin-left:8px}
.tr-st{font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 8px;border-radius:3px}
.tr-st.ok{color:var(--green);background:rgba(80,250,123,.08)}.tr-st.fail{color:var(--red);background:rgba(255,85,85,.08)}
.tr-body{padding:14px}
.tr-step{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.tr-sn{width:90px;font-family:var(--mono);font-size:12px;text-align:right;color:var(--cyan);flex-shrink:0}
.tr-bw{flex:1;height:22px;background:var(--bg);border-radius:3px;position:relative;overflow:hidden}
.tr-b{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:8px;font-family:var(--mono);font-size:11px;transition:width .3s ease}
.tr-b.ok{background:linear-gradient(90deg,rgba(80,250,123,.2),rgba(80,250,123,.05));border-left:2px solid var(--green);color:var(--green)}
.tr-b.fail{background:linear-gradient(90deg,rgba(255,85,85,.2),rgba(255,85,85,.05));border-left:2px solid var(--red);color:var(--red)}
.tr-b.pend{background:linear-gradient(90deg,rgba(241,250,140,.15),rgba(241,250,140,.03));border-left:2px solid var(--yellow);color:var(--yellow)}
.tr-ss{width:32px;font-family:var(--mono);font-size:11px;flex-shrink:0}
.tr-tot{text-align:right;padding-top:8px;border-top:1px solid var(--line);margin-top:4px;font-family:var(--mono);font-size:11px;color:var(--comment)}

/* Detail panel */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:auto}
.det{position:fixed;top:0;right:0;width:520px;max-width:90vw;height:100vh;background:var(--bg2);border-left:1px solid var(--line);z-index:60;transform:translateX(100%);transition:transform .22s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
.det.open{transform:translateX(0)}
.dh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);flex-shrink:0}
.dx{width:26px;height:26px;border-radius:5px;border:1px solid var(--line);background:var(--bg);color:var(--comment);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.dx:hover{border-color:var(--fg);color:var(--fg)}
.ds{flex:1;overflow-y:auto;padding:14px 16px}
.da{display:flex;gap:8px;margin-bottom:14px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:4px;border:1px solid var(--line);background:var(--bg);color:var(--fg);cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:500;transition:all .12s}
.btn:hover{border-color:var(--purple);color:var(--purple)}
.btn-p{background:rgba(189,147,249,.08);border-color:var(--purple);color:var(--purple)}
.sect{margin-bottom:16px}
.sect-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--comment);margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--line)}
.kv{width:100%}.kv td{padding:2px 0;font-family:var(--mono);font-size:12px;vertical-align:top}
.kv td:first-child{color:var(--cyan);width:35%;padding-right:10px}
.kv td:last-child{word-break:break-all}
.cblk{background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:10px;font-family:var(--mono);font-size:12px;line-height:1.6;max-height:280px;overflow:auto;white-space:pre-wrap;word-break:break-word}

/* Tunnel cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;padding:18px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:7px;padding:14px;cursor:pointer;transition:all .15s;text-decoration:none;color:var(--fg);display:block}
.card:hover{border-color:var(--purple);background:var(--bg3)}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-name{font-family:var(--mono);font-size:14px;font-weight:600}
.card-url{font-family:var(--mono);font-size:11px;color:var(--comment);margin-bottom:10px;word-break:break-all}
.card-stats{display:flex;gap:14px;font-size:12px;color:var(--comment)}.card-stats b{color:var(--fg)}
.card-meta{font-family:var(--mono);font-size:11px;color:var(--comment);margin-top:8px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--comment)}
.empty code{font-family:var(--mono);font-size:12px;color:var(--purple);background:rgba(189,147,249,.08);padding:2px 6px;border-radius:3px}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import{h,render}from'https://esm.sh/preact@10.24.3';
import{useState,useEffect,useCallback}from'https://esm.sh/preact@10.24.3/hooks';
import htm from'https://esm.sh/htm@3.1.1';
const html=htm.bind(h);
const SUB=location.pathname.replace(/^\/ui\/?/,'').replace(/\/$/,'')||'';

function App(){return SUB?html`<${TunnelPage} s=${SUB}/>`:html`<${OverviewPage}/>`}

// ── Overview ─────────────────────────────────────────────────────────
function OverviewPage(){
const[d,setD]=useState(null);
const poll=useCallback(async()=>{try{setD(await(await fetch('/api/overview')).json())}catch(e){}},[]);
useEffect(()=>{poll();const i=setInterval(poll,3000);return()=>clearInterval(i)},[poll]);
const t=d?.tunnels||[];
return html`<div class=shell>
<nav class=side><div class=side-logo>p</div><button class="side-btn on" title="Tunnels">⬡</button></nav>
<div class=main>
<div class=top><span class=top-title>pipepie</span><div class=top-sep/><span style="font-size:13px;color:var(--comment)">All Tunnels</span></div>
<div class=stats>
<div class=st><span class=l>Tunnels</span><div class=v>${t.length}</div></div>
<div class=st><span class=l>Online</span><div class="v g">${d?.online||0}</div></div>
<div class=st><span class=l>Requests</span><div class=v>${d?.total_requests||0}</div></div>
<div class=st><span class=l>Errors</span><div class="v r">${d?.total_errors||0}</div></div>
</div>
<div class=content>
${t.length===0?html`<div class=empty><p>No tunnels yet. Run <code>pie connect 3000</code></p></div>`:html`
<div class=cards>${t.map(x=>html`
<a href="/ui/${x.subdomain}" class=card key=${x.subdomain}>
<div class=card-h><span class=card-name><span class="dot ${x.online?'on':'off'}" style="display:inline-block;vertical-align:middle;margin-right:6px"/>${x.subdomain}</span>
<span style="font-family:var(--mono);font-size:10px;color:${x.online?'var(--green)':'var(--comment)'}">${x.online?'online':'offline'}</span></div>
<div class=card-url>${x.public_url}</div>
<div class=card-stats><span><b>${x.total}</b> reqs</span><span style="color:var(--green)"><b>${x.success}</b> ok</span><span style="color:${x.errors>0?'var(--red)':'var(--comment)'}"><b>${x.errors}</b> err</span><span>rate <b>${x.success_rate}</b></span></div>
${x.online?html`<div class=card-meta>from ${x.remote_addr} · up ${x.uptime}</div>`:''}
</a>`)}</div>`}
</div></div></div>`}

// ── Tunnel Detail ────────────────────────────────────────────────────
function TunnelPage({s}){
const[reqs,setReqs]=useState([]);const[total,setTotal]=useState(0);const[online,setOnline]=useState(false);
const[sel,setSel]=useState(null);const[tab,setTab]=useState('requests');
const poll=useCallback(async()=>{try{const d=await(await fetch('/api/tunnels/'+s+'/requests?limit=50')).json();setReqs(d.requests||[]);setTotal(d.total||0);setOnline(d.online||false)}catch(e){}},[s]);
useEffect(()=>{poll();const i=setInterval(poll,2000);return()=>clearInterval(i)},[poll]);
const replay=async id=>{await fetch('/api/tunnels/'+s+'/requests/'+id+'/replay',{method:'POST'});setTimeout(poll,400)};
const copyC=r=>{const h=J(r.req_headers);let c='curl -X '+r.method+' \\\n  "'+location.protocol+'//'+s+'.'+location.host+r.path+'"';for(const[k,v]of Object.entries(h)){if(k!=='Host')c+=' \\\n  -H "'+k+': '+v+'"'};const b=D(r.req_body);if(b)c+=" \\\n  -d '"+b+"'";navigator.clipboard.writeText(c)};
const ok=reqs.filter(r=>r.resp_status&&r.resp_status<400).length;
const er=reqs.filter(r=>r.status==='failed'||r.status==='timeout'||(r.resp_status&&r.resp_status>=400)).length;
const ds=reqs.filter(r=>r.duration_ms).map(r=>r.duration_ms);const avg=ds.length?Math.round(ds.reduce((a,b)=>a+b,0)/ds.length):0;
return html`<div class=shell>
<nav class=side>
<div class=side-logo>p</div>
<a href="/ui/" class=side-btn title="All Tunnels">⬡</a>
<button class="side-btn ${tab==='requests'?'on':''}" onClick=${()=>setTab('requests')} title="Requests">◉</button>
<button class="side-btn ${tab==='traces'?'on':''}" onClick=${()=>setTab('traces')} title="Traces">◈</button>
</nav>
<div class=main>
<div class=top>
<a href="/ui/" style="text-decoration:none"><span class=top-title>pipepie</span></a>
<div class=top-sep/>
<div class=top-pill><span class="dot ${online?'on':'off'}"/>${s}</div>
<div class=top-r><b>${total}</b> reqs</div>
</div>
<div class=stats>
<div class=st><span class=l>Requests</span><div class=v>${total}</div></div>
<div class=st><span class=l>Success</span><div class="v g">${ok}</div></div>
<div class=st><span class=l>Errors</span><div class="v r">${er}</div></div>
<div class=st><span class=l>Avg Latency</span><div class="v y">${avg}<span style="font-size:12px;font-weight:400">ms</span></div></div>
</div>
<div class=content>
${tab==='requests'?html`<${ReqView} reqs=${reqs} sel=${sel} onSel=${setSel}/>`:html`<${TraceView} reqs=${reqs}/>`}
</div>
</div>
<div class="ov ${sel?'open':''}" onClick=${()=>setSel(null)}/>
<div class="det ${sel?'open':''}">
${sel&&html`<${DetailPanel} r=${sel} onClose=${()=>setSel(null)} onReplay=${replay} onCopy=${copyC}/>`}
</div>
</div>`}

// ── Requests ─────────────────────────────────────────────────────────
function ReqView({reqs,sel,onSel}){
if(!reqs.length)return html`<div class=empty><p>Waiting for webhooks...<br/>Send to <code>${location.protocol}//${SUB}.${location.host}</code></p></div>`;
return html`<div>
<div class=rh><span>Time</span><span>Method</span><span>Path</span><span>Status</span><span>Dur</span><span>Size</span><span>Step</span></div>
${reqs.map(r=>html`<div key=${r.id} class="rr ${sel&&sel.id===r.id?'sel':''}" onClick=${()=>onSel(r)}>
<span class=c-t>${T(r.created_at)}</span>
<span class="c-m m${r.method}">${r.method}</span>
<span class=c-p>${r.path}</span>
<span>${ST(r)}</span>
<span class=c-d>${r.duration_ms?r.duration_ms+'ms':'—'}</span>
<span class=c-d>${r.req_size?fS(r.req_size):''}</span>
<span>${r.step_name?html`<span class=step>${r.step_name}</span>`:''}</span>
</div>`)}</div>`}

// ── Pipeline Traces ──────────────────────────────────────────────────
function TraceView({reqs}){
const tm={};reqs.forEach(r=>{if(r.trace_id){if(!tm[r.trace_id])tm[r.trace_id]=[];tm[r.trace_id].push(r)}});
const traces=Object.entries(tm).map(([id,steps])=>{steps.sort((a,b)=>a.created_at.localeCompare(b.created_at));const fail=steps.some(s=>s.status==='failed'||s.status==='timeout');const ms=steps.reduce((a,s)=>a+(s.duration_ms||0),0);const mx=Math.max(...steps.map(s=>s.duration_ms||1),1);return{id,pipe:steps[0].pipeline_id,steps,fail,ms,mx}});
if(!traces.length)return html`<div class=empty><p>No pipeline traces yet.<br/>Add <code>X-Pipepie-Pipeline</code> headers to correlate webhooks.</p></div>`;
return html`<div style="padding-top:10px">${traces.map(t=>html`
<div class=tr-card key=${t.id}>
<div class=tr-h>
<div><span class=tr-name>${t.pipe||'pipeline'}</span><span class=tr-id>${t.id}</span></div>
<span class="tr-st ${t.fail?'fail':'ok'}">${t.fail?'FAILED':'OK'} · ${t.ms}ms</span>
</div>
<div class=tr-body>
${t.steps.map(s=>{const w=Math.max(10,((s.duration_ms||0)/t.mx)*100);const c=s.status==='forwarded'?'ok':s.status==='failed'?'fail':'pend';return html`
<div class=tr-step>
<span class=tr-sn>${s.step_name||s.path}</span>
<div class=tr-bw><div class="tr-b ${c}" style="width:${w}%">${s.duration_ms?s.duration_ms+'ms':''}</div></div>
<span class="tr-ss ${s.resp_status>=400?'s4':'s2'}">${s.resp_status||'...'}</span>
</div>`})}
<div class=tr-tot>${t.steps.length} steps · ${t.ms}ms total</div>
</div></div>`)}</div>`}

// ── Detail Panel ─────────────────────────────────────────────────────
function DetailPanel({r,onClose,onReplay,onCopy}){
const hd=J(r.req_headers);const rh=r.resp_headers?J(r.resp_headers):{};const body=D(r.req_body);const rb=D(r.resp_body);
return html`<div class=dh>
<div><span class="c-m m${r.method}" style="font-size:14px">${r.method}</span> <span style="font-family:var(--mono);font-size:13px;color:var(--cyan)">${r.path}</span></div>
<button class=dx onClick=${onClose}>✕</button></div>
<div class=ds>
<div class=da><button class="btn btn-p" onClick=${()=>onReplay(r.id)}>↻ Replay</button><button class=btn onClick=${()=>onCopy(r)}>⎘ cURL</button></div>
<div class=sect><div class=sect-t>Request Headers</div><table class=kv><tbody>${Object.entries(hd).map(([k,v])=>html`<tr><td>${k}</td><td>${v}</td></tr>`)}</tbody></table></div>
${body?html`<div class=sect><div class=sect-t>Request Body</div><div class=cblk>${F(body)}</div></div>`:''}
${r.resp_status!=null?html`
<div class=sect><div class=sect-t>Response · <span class=${r.resp_status>=400?'s4':'s2'}>${r.resp_status}</span></div><table class=kv><tbody>${Object.entries(rh).map(([k,v])=>html`<tr><td>${k}</td><td>${v}</td></tr>`)}</tbody></table></div>
${rb?html`<div class=sect><div class=sect-t>Response Body</div><div class=cblk>${F(rb)}</div></div>`:''}
`:''}
<div class=sect><div class=sect-t>Metadata</div><table class=kv><tbody>
<tr><td>ID</td><td style="font-size:11px;color:var(--comment)">${r.id}</td></tr>
<tr><td>Status</td><td>${r.status}</td></tr>
${r.source_ip?html`<tr><td>Source IP</td><td>${r.source_ip}</td></tr>`:''}
${r.duration_ms?html`<tr><td>Duration</td><td>${r.duration_ms}ms</td></tr>`:''}
${r.pipeline_id?html`<tr><td>Pipeline</td><td style="color:var(--purple)">${r.pipeline_id}</td></tr>`:''}
${r.step_name?html`<tr><td>Step</td><td style="color:var(--cyan)">${r.step_name}</td></tr>`:''}
${r.trace_id?html`<tr><td>Trace</td><td style="font-size:11px">${r.trace_id}</td></tr>`:''}
${r.error?html`<tr><td>Error</td><td style="color:var(--red)">${r.error}</td></tr>`:''}
</tbody></table></div>
</div>`}

// Helpers
function T(iso){if(!iso)return'';try{return new Date(iso).toLocaleTimeString('en-US',{hour12:false})}catch{return iso}}
function ST(r){if(r.status==='pending')return html`<span class=sp>···</span>`;if(r.status==='timeout')return html`<span class=s5>TMO</span>`;if(r.status==='failed')return html`<span class=s5>ERR</span>`;const c=r.resp_status>=500?'s5':r.resp_status>=400?'s4':'s2';return html`<span class="c-s ${c}">${r.resp_status}</span>`}
function J(s){try{return JSON.parse(s||'{}')}catch{return{}}}
function D(d){if(!d)return null;if(typeof d==='string')return d;try{return atob(d)}catch{return String(d)}}
function F(s){if(!s)return'';try{return JSON.stringify(JSON.parse(s),null,2)}catch{return s}}
function fS(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'K';return(b/1048576).toFixed(1)+'M'}

render(html`<${App}/>`,document.getElementById('app'));
</script>
