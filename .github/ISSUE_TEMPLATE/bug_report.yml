name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: Expected behavior
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pie connect 3000`
        2. Send webhook to ...
        3. See error ...
  - type: input
    id: version
    attributes:
      label: Pipepie version
      placeholder: "pie version output"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: Are you running
      options:
        - Client (pie connect)
        - Server (pie server)
        - Both
    validations:
      required: true
